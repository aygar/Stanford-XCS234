name: XCS234
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.12
  - notebook=7.5.5
  - ffmpeg=4.2.2
  - moviepy=1.0.3
  - tensorboard=2.20.0
  - pip=26.0
  - pip:
    - setuptools==81.0.0
    - cmake==4.3.1; sys_platform != "win32"
    - wget==3.2; sys_platform != "win32"
    - matplotlib==3.10.8
    - tqdm==4.67.3
    - numpy==2.4.4
    - pandas==3.0.2
    - scipy==1.17.1
    - pyglet==2.1.14
    - gymnasium[mujoco]==1.2.3
    - stable_baselines3[extra]==2.8.0
    - "--find-links https://download.pytorch.org/whl/torch/"
    - torch==2.11.0; sys_platform != "linux" and sys_platform != "win32"
    - torch==2.11.0+cpu; sys_platform == "linux" or sys_platform == "win32"
